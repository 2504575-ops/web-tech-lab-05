<!DOCTYPE html>
<html>
<head>
    <title>Array Calculator</title>

    <style>
        body {
            margin: 0;
            font-family: Verdana, sans-serif;
            background-color: lightblue;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: white;
            padding: 35px;
            border-radius: 20px;
            width: 420px;
            box-shadow: 0 8px 20px black;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: darkblue;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background-color: rgb(138, 190, 214);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background-color: darkred;
        }

        .output {
            margin-top: 25px;
            text-align: left;
            font-size: 15px;
        }

        .output div {
            margin: 6px 0;
            padding: 8px;
            background-color: whitesmoke;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Array Analyzer</h2>
    <button onclick="analyzeArray()">Display Info</button>

    <div class="output" id="result"></div>
</div>

<script>
function analyzeArray() {
    let values = [7, 18, 4, 25, 10, 2];
    let total = 0;

    for (let num of values) {
        total += num;
    }

    let highest = Math.max(...values);
    let reversedArray = values.slice().reverse();

    let resultBox = document.getElementById("result");

    resultBox.innerHTML = `
        <div><strong>Array:</strong> ${values.join(" | ")}</div>
        <div><strong>Total:</strong> ${total}</div>
        <div><strong>Highest Value:</strong> ${highest}</div>
        <div><strong>Reversed:</strong> ${reversedArray.join(" | ")}</div>
    `;
}
</script>

</body>
</html>
